<div navbar ng-init="currentItem='service'"></div>
<div ng-show="Auth.processing||!loaded">
    <div loading></div>
</div>

<div id="main" ng-show="!Auth.processing&&loaded" style="display:none" ng-init="loadInfo()">
    <div class="module-header">
        <h3>服务管理</h3>
    </div>

    <div class="tabbable">
        <ul class="nav nav-tabs">
            <li ng-repeat="cat in categories" ng-class="'active' | iftrue:activeTabName==cat.id">
                <a href="#{{cat.id}}" ng-click="sec(cat.id)" data-toggle="tab">{{cat.name}}</a>
            </li>
            <li ng-class="'active' | iftrue:activeTabName=='other'" ng-show="otherServices.length > 0">
                <a href="#other" ng-click="sec('other')" data-toggle="tab">其他</a>
            </li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane table-responsive" ng-repeat="cat in categories" ng-class="'active' | iftrue:activeTabName==cat.id" id="{{cat.id}}">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th colspan="4">{{cat.name}} 服务</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr ng-repeat="svc in cat.services">
                            <td style="width:100px">{{svc.name}}</td>
                            <td style="width:60px" ng-bind-html-unsafe="svc.status | service.status"></td>
                            <td class="muted">{{svc.description}}</td>
                            <td style="width:180px">
                                <span ng-show="svc.installed">
                                    <button class="btn btn-xs btn-success" ng-show="svc.status != 'running'"
                                        ng-click="start(svc)">启动</button>
                                    <button class="btn btn-xs btn-warning" ng-show="svc.status == 'running'"
                                        ng-click="stop(svc)">停止</button>
                                    <button class="btn btn-xs btn-danger" ng-show="svc.status == 'running'"
                                        ng-click="restart(svc)">重启</button>
                                    <a class="btn btn-xs btn-info" href="#/service/{{svc.id}}">详情</a>
                                </span>
                                <button class="btn btn-xs btn-primary" ng-hide="svc.installed"
                                    ng-click="install(svc)">安装</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- 其他服务 -->
            <div class="tab-pane table-responsive" ng-class="'active' | iftrue:activeTabName=='other'" id="other" ng-show="otherServices.length > 0">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th colspan="4">其他服务（系统发现）</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr ng-repeat="svc in otherServices">
                            <td style="width:120px">{{svc.name}}</td>
                            <td style="width:60px" ng-bind-html-unsafe="svc.status | service.status"></td>
                            <td class="muted">通过 {{svc.package_manager}} 发现的系统服务</td>
                            <td style="width:180px">
                                <button class="btn btn-xs btn-success" ng-hide="svc.status == 'running'"
                                    ng-click="start(svc)">启动</button>
                                <button class="btn btn-xs btn-warning" ng-show="svc.status == 'running'"
                                    ng-click="stop(svc)">停止</button>
                                <button class="btn btn-xs btn-danger" ng-show="svc.status == 'running'"
                                    ng-click="restart(svc)">重启</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
