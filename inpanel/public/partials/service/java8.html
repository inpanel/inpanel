<div navbar ng-init="currentItem='service.java8'"></div>
<div ng-show="!loaded">
    <div loading></div>
</div>

<div id="main" ng-show="loaded" style="display:none" ng-init="checkInstalled()">
    <div class="module-header">
        <h3>Java 8 - Runtime Environment</h3>
    </div>

    <div srvinstall ng-init="name='Java 8';pkg='java-1.8.0-openjdk';expected_repolist=['base'];"></div>

    <div class="tabbable" ng-show="installed">
        <ul class="nav nav-tabs">
            <li ng-class="'active' | iftrue:activeTabName=='base'"><a href="#base" ng-click="sec('base')" data-toggle="tab">基本信息</a></li>
            <li ng-class="'active' | iftrue:activeTabName=='configfile'" id="configfile"><a href="#configfile" ng-click="sec('configfile')" data-toggle="tab">配置文件</a></li>
            <li ng-class="'active' | iftrue:activeTabName=='ext'" id="ext"><a href="#ext" ng-click="sec('ext')" data-toggle="tab">扩展</a></li>
            <li ng-class="'active' | iftrue:activeTabName=='update'" id="update"><a href="#update" ng-click="sec('update')" data-toggle="tab">升级</a></li>
            <li ng-class="'active' | iftrue:activeTabName=='uninstall'" id="uninstall"><a href="#uninstall" ng-click="sec('uninstall')" data-toggle="tab">卸载</a></li>
        </ul>
        <div class="tab-content">
            <div class="tab-pane" ng-class="'active' | iftrue:activeTabName=='base'" id="base">
                <div srvbase ng-init="name='Java 8';pkg='java-1.8.0-openjdk';service='java8';"></div>
            </div>
            <div class="tab-pane" ng-class="'active' | iftrue:activeTabName=='configfile'" id="configfile">
                <div srvfile ng-init="items=[{name:'JDK 目录', path:'/usr/lib/jvm/java-1.8.0-openjdk', isdir:true},{name:'JAVA_HOME', path:'/etc/profile.d/java.sh', isfile:true}];"></div>
            </div>
            <div class="tab-pane" ng-class="'active' | iftrue:activeTabName=='ext'" id="ext">
                <div srvext ng-init="name='Java 8';pkg='java-1.8.0-openjdk';"></div>
            </div>
            <div class="tab-pane" ng-class="'active' | iftrue:activeTabName=='update'" id="update">
                <div srvupdate ng-init="name='Java 8';pkg='java-1.8.0-openjdk';"></div>
            </div>
            <div class="tab-pane" ng-class="'active' | iftrue:activeTabName=='uninstall'" id="uninstall">
                <div srvuninstall ng-init="name='Java 8';pkg='java-1.8.0-openjdk';"></div>
            </div>
        </div>
    </div>

</div>
