<div navbar ng-init="currentItem='plugins'"></div>
<div ng-show="!loaded"><div loading></div></div>

<div id="main" ng-show="loaded" style="display:none">
    <div class="module-header">
        <h3>插件管理</h3>
    </div>

    <div ng-init="load()">
        <table class="table table-hover table-condensed">
            <thead>
                <tr>
                    <th style="width:150px">插件名称</th>
                    <th style="width:80px">状态</th>
                    <th style="width:350px">描述</th>
                    <th style="width:120px">作者</th>
                    <th style="width:80px">操作</th>
                </tr>
            </thead>
            <tbody>
                <tr ng-repeat="plugin in plugins">
                    <td>
                        <a href="#/plugins/{{plugin.id}}">{{plugin.name}}</a>
                        <span class="muted">v{{plugin.version}}</span>
                    </td>
                    <td>
                        <span ng-class="'label label-success' | iftrue:plugin.enabled" ng-class="'label label-default' | iftrue:!plugin.enabled">
                            <span ng-show="plugin.enabled">已启用</span>
                            <span ng-show="!plugin.enabled">已禁用</span>
                        </span>
                    </td>
                    <td class="muted">{{plugin.description}}</td>
                    <td class="muted">{{plugin.author}}</td>
                    <td>
                        <button class="btn btn-xs btn-default" ng-click="togglePlugin(plugin)">
                            <span ng-show="plugin.enabled">禁用</span>
                            <span ng-show="!plugin.enabled">启用</span>
                        </button>
                        <button class="btn btn-xs btn-danger" ng-click="uninstallPlugin(plugin)">
                            卸载
                        </button>
                    </td>
                </tr>
                <tr ng-show="plugins.length == 0">
                    <td colspan="5" class="text-center muted">暂无已安装插件</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
