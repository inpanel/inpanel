<div navbar ng-init="currentItem='plugins'"></div>
<div ng-show="!loaded"><div loading></div></div>

<div id="main" ng-show="loaded" style="display:none">
    <div class="module-header">
        <h3>{{pluginInfo.name || '插件详情'}}</h3>
    </div>

    <div ng-init="load()">
        <div class="tabbable">
            <ul class="nav nav-tabs">
                <li ng-class="'active' | iftrue:activeTab=='home'">
                    <a href="#home" ng-click="sec('home')" data-toggle="tab">首页</a>
                </li>
                <li ng-class="'active' | iftrue:activeTab=='config'">
                    <a href="#config" ng-click="sec('config')" data-toggle="tab">设置</a>
                </li>
                <li ng-class="'active' | iftrue:activeTab=='info'">
                    <a href="#info" ng-click="sec('info')" data-toggle="tab">关于</a>
                </li>

                <li class="pull-right">
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-default" ng-click="refreshPlugin()" title="刷新"><i class="glyphicon glyphicon-refresh"></i></button>
                    </div>
                </li>
            </ul>
            <div class="tab-content">
                <div class="tab-pane" ng-class="'active' | iftrue:activeTab=='home'" id="home">
                    <div ng-include="'/page/plugins/' + pluginId + '/index.html'" onload="loadPluginAssets()"></div>
                </div>
                <div class="tab-pane" ng-class="'active' | iftrue:activeTab=='config'" id="config">
                    <form class="form-horizontal" ng-submit="saveConfig()">
                        <div class="control-group" ng-repeat="(key, field) in pluginInfo.config_schema">
                            <label class="control-label">{{field.label || key}}</label>
                            <div class="controls">
                                <input class="form-control" type="text" ng-model="pluginConfig[key]" placeholder="{{field.default || ''}}" ng-required="field.required">
                            </div>
                        </div>
                        <hr />
                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">保存配置</button>
                        </div>
                    </form>
                </div>
                <div class="tab-pane" ng-class="'active' | iftrue:activeTab=='info'" id="info">
                    <table class="table table-hover table-bordered">
                        <tr><td>名称</td><td>{{pluginInfo.name}}</td></tr>
                        <tr><td>版本</td><td>{{pluginInfo.version}}</td></tr>
                        <tr><td>描述</td><td>{{pluginInfo.description}}</td></tr>
                        <tr><td>作者</td><td>{{pluginInfo.author}}</td></tr>
                        <tr><td>邮箱</td><td>{{pluginInfo.email}}</td></tr>
                        <tr><td>链接</td><td><a href="{{pluginInfo.link}}" target="_blank">{{pluginInfo.link}}</a></td></tr>
                        <tr><td>许可证</td><td>{{pluginInfo.license}}</td></tr>
                        <tr><td>分类</td><td>{{pluginInfo.category}}</td></tr>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
